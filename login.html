<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sushil Admin | Login</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --gold: #c2912e;
            --gold-light: #fde68a;
            --dark: #0c0a09;
            --dark2: #1c1917;
            --dark3: #292524;
            --orange: #c2410c;
            --orange-light: #ea580c;
            --text: #fafaf9;
            --text-muted: #a8a29e;
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--dark);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient background */
        .bg-ambient {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .bg-ambient::before {
            content: '';
            position: absolute;
            top: -20%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(194, 65, 12, 0.12) 0%, transparent 70%);
        }

        .bg-ambient::after {
            content: '';
            position: absolute;
            bottom: -20%;
            left: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(194, 145, 46, 0.08) 0%, transparent 70%);
        }

        /* Grid pattern */
        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }

        /* Logo */
        .logo-area {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeDown 0.6s ease both;
        }

        .logo-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--orange), var(--gold));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            margin: 0 auto 16px;
            box-shadow: 0 8px 32px rgba(194, 65, 12, 0.3);
        }

        .logo-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 0.15em;
        }

        .logo-title span {
            color: var(--gold);
        }

        .logo-sub {
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-top: 4px;
        }

        /* Card */
        .card {
            background: rgba(28, 25, 23, 0.8);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 36px;
            backdrop-filter: blur(20px);
            animation: fadeUp 0.6s ease 0.1s both;
        }

        /* Steps */
        .step {
            display: none;
        }

        .step.active {
            display: block;
            animation: fadeIn 0.35s ease both;
        }

        /* Step indicator */
        .step-indicator {
            display: none;
        }

        .step-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .step-sub {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 28px;
            line-height: 1.5;
        }

        .step-sub span {
            color: var(--gold);
            font-weight: 500;
        }

        /* Form fields */
        .field {
            margin-bottom: 18px;
        }

        .field label {
            display: block;
            font-size: 10px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 14px;
            pointer-events: none;
        }

        .input-wrap input {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 13px 14px 13px 42px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
        }

        .input-wrap input::placeholder {
            color: rgba(168, 162, 158, 0.4);
        }

        .input-wrap input:focus {
            border-color: var(--orange);
            background: rgba(194, 65, 12, 0.05);
        }

        .toggle-pass {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 13px;
            cursor: pointer;
            pointer-events: all !important;
            background: none;
            border: none;
            padding: 4px;
        }

        /* OTP boxes */
        .otp-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            margin-bottom: 18px;
        }

        .otp-box {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 10px;
            height: 52px;
            text-align: center;
            font-size: 20px;
            font-weight: 500;
            color: var(--text);
            font-family: 'Cormorant Garamond', serif;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
            caret-color: var(--orange);
        }

        .otp-box:focus {
            border-color: var(--orange);
            background: rgba(194, 65, 12, 0.06);
        }

        .otp-box.filled {
            border-color: var(--gold);
            color: var(--gold);
        }

        /* Timer */
        .otp-timer {
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .otp-timer span {
            color: var(--orange);
            font-weight: 500;
        }

        .resend-btn {
            background: none;
            border: none;
            color: var(--gold);
            font-size: 12px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            text-decoration: underline;
            display: none;
        }

        .resend-btn.visible {
            display: inline;
        }

        /* Submit button */
        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, var(--orange), #9a3412);
            border: none;
            border-radius: 10px;
            padding: 15px;
            color: white;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s;
            position: relative;
            overflow: hidden;
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-primary .btn-loader {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin: 0 auto;
        }

        .btn-primary.loading .btn-text {
            display: none;
        }

        .btn-primary.loading .btn-loader {
            display: block;
        }

        /* Error / success messages */
        .msg {
            font-size: 12px;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 16px;
            display: none;
        }

        .msg.error {
            background: rgba(220, 38, 38, 0.1);
            border: 1px solid rgba(220, 38, 38, 0.2);
            color: #fca5a5;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .msg.success {
            background: rgba(22, 163, 74, 0.1);
            border: 1px solid rgba(22, 163, 74, 0.2);
            color: #86efac;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
            color: var(--text-muted);
            font-size: 11px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* Demo hint */
        .demo-hint {
            margin-top: 20px;
            padding: 12px 16px;
            background: rgba(194, 145, 46, 0.06);
            border: 1px solid rgba(194, 145, 46, 0.15);
            border-radius: 10px;
            font-size: 11px;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .demo-hint strong {
            color: var(--gold);
        }

        /* Success screen */
        .success-screen {
            text-align: center;
            padding: 20px 0;
        }

        .success-icon {
            width: 64px;
            height: 64px;
            background: rgba(22, 163, 74, 0.1);
            border: 1px solid rgba(22, 163, 74, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 24px;
            color: #86efac;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20%,
            60% {
                transform: translateX(-6px);
            }

            40%,
            80% {
                transform: translateX(6px);
            }
        }

        .shake {
            animation: shake 0.4s ease;
        }
    </style>
</head>

<body>

    <div class="bg-ambient"></div>
    <div class="bg-grid"></div>

    <div class="container">
        <div class="logo-area">
            <div class="logo-icon">&#9749;</div>
            <div class="logo-title">SUSHIL <span>CAFE</span></div>
            <div class="logo-sub">Admin Control Center</div>
        </div>

        <div class="card">

            <!-- STEP 1: Username + Password -->
            <div class="step active" id="step1">
                <div class="step-title">Welcome back</div>
                <div class="step-sub">Enter your admin credentials to continue.</div>

                <div id="step1-msg" class="msg"></div>

                <div class="field">
                    <label>Username</label>
                    <div class="input-wrap">
                        <i class="fas fa-user"></i>
                        <input type="password" id="username" placeholder="admin" autocomplete="username">
                        <button class="toggle-pass" onclick="toggleUsername()" type="button">
                            <i class="fas fa-eye" id="eye-icon-user"></i>
                        </button>
                    </div>
                </div>

                <div class="field">
                    <label>Password</label>
                    <div class="input-wrap">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
                        <button class="toggle-pass" onclick="togglePassword()" type="button">
                            <i class="fas fa-eye" id="eye-icon"></i>
                        </button>
                    </div>
                </div>

                <button class="btn-primary" id="btn1" onclick="submitStep1()">
                    <span class="btn-text">Login &nbsp;→</span>
                    <div class="btn-loader"></div>
                </button>
            </div>

            <!-- Success -->
            <div class="step" id="step3">
                <div class="success-screen">
                    <div class="success-icon">&#10003;</div>
                    <div class="step-title">Access granted</div>
                    <div class="step-sub" style="text-align:center; margin-top:8px;">
                        Welcome back, <span style="color:var(--gold)">Sushil Kumar</span>.<br>
                        Redirecting to dashboard...
                    </div>
                    <div
                        style="margin-top:24px; height:3px; background:var(--dark3); border-radius:2px; overflow:hidden;">
                        <div id="progress-bar"
                            style="height:100%; width:0; background:linear-gradient(90deg,var(--orange),var(--gold)); transition:width 2.5s ease; border-radius:2px;">
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // ── ✏️ APNA USERNAME AUR PASSWORD YAHAN CHANGE KARO ──
        const ADMIN = { username: 'Sushil2568477', password: 'Sunilcafe@9690' };
        // ──────────────────────────────────────────────────────

        // ── Login ──
        function submitStep1() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value;
            const btn = document.getElementById('btn1');

            document.getElementById('step1-msg').style.display = 'none';

            if (!u || !p) {
                showMsg('step1-msg', 'error', 'Please fill in all fields.');
                return;
            }

            btn.classList.add('loading');
            btn.disabled = true;

            setTimeout(() => {
                if (u === ADMIN.username && p === ADMIN.password) {
                    sessionStorage.setItem('adminLoggedIn', 'true');
                    goToSuccess();
                } else {
                    btn.classList.remove('loading');
                    btn.disabled = false;
                    showMsg('step1-msg', 'error', 'Invalid username or password.');
                    document.querySelector('.card').classList.add('shake');
                    setTimeout(() => document.querySelector('.card').classList.remove('shake'), 400);
                    setTimeout(() => {
                        document.getElementById('username').value = '';
                        document.getElementById('password').value = '';
                        document.getElementById('username').focus();
                    }, 900);
                }
            }, 1000);
        }

        function goToSuccess() {
            document.getElementById('step1').classList.remove('active');
            document.getElementById('step3').classList.add('active');
            setTimeout(() => {
                document.getElementById('progress-bar').style.width = '100%';
            }, 100);
            setTimeout(() => {
                window.location.href = 'Admin.html';
            }, 2800);
        }

        // ── Username toggle ──
        function toggleUsername() {
            const input = document.getElementById('username');
            const icon = document.getElementById('eye-icon-user');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye';
            }
        }

        // ── Password toggle ──
        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('eye-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye';
            }
        }

        // Enter key support
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') submitStep1();
        });

        function showMsg(id, type, text) {
            const el = document.getElementById(id);
            el.className = 'msg ' + type;
            el.innerHTML = `<i class="fas fa-${type === 'error' ? 'exclamation-circle' : 'check-circle'}"></i> ${text}`;
            el.style.display = 'flex';
        }
    </script>
</body>

</html>
